body:
  text: 目次嘉興府流虹興聖禪寺語録溫州鴈山能仁禪寺語録越州九巖慧雲禪寺語録天台護國廣恩禪寺語録臨安府崇恩演福禪寺語録溫州江心龍翔興慶禪寺語録福州雪峯崇聖禪寺語録再住雪峯崇聖禪寺語録拈古頌古法語讚頌小佛事跋絶岸和尚初住嘉興府流虹興聖禪寺語録住泉州開元禪寺嗣法門人妙恩等編師於寶祐元年癸丑十月二十八日在上柏資聖寺受請入院指三門云祖翁閫域撲地掀天親切一回打透不妨垂手入𢌅據室以竹篦橫案云摩竭陀國親行此令從上以來孰敢違命擊禪床便起升座拈香祝聖罷次拈香云文武火中拈得貞實獨存天星湖上揭開臭氣難掩奉為前住徑山佛鑑禪師無準大尚趺坐問答不録乃云對百萬衆拈年面壁與賊過梯所以奇特因緣還遇奇特人激發殊勝大事須向殊勝處舉揚一句當機直得鐘聲鼓聲板聲魚聲驚天震動千車合轍不論有學無學義學玄學把手同歸疏秀水之末流接曹溪之餘潤便與麼去免得新興聖更舉一釋迦二元和三佛陀阿呵呵團欒且唱太平歌上堂文殊普賢廣談理事德山臨濟單行棒喝諸人還知興聖用處麼擲下主丈云雖是死蛇解弄也活上堂觸目未嘗無臨機道什麼錢是足陌物是定價坐破七箇蒲團卷簾方見天下千里追風非駿馬上堂黃蘗打臨濟義出豐年興化趕克賓蝦為子屈其功蓋代只要重論一火鑄成金彈子棒頭敲出玉麒麟上堂拈主丈召衆云德山以此撒火飛星趙州以此登山打狗興聖以此撑門拄戶衲僧以此渡水穿雲若喚作主丈子入地獄如箭射卓主丈下座上堂淨倮倮赤灑灑婷娉柳底花間依約風前月下拍床一下云僧繇妙筆難描畫二月初十遊山歸上堂舉長沙一日遊山歸至門前首座問云和尚什麼處去來沙云遊山來座云到什麼處來沙云始隨芳草去又逐落花回座云大似春意沙云也勝秋露滴芙蕖頌云理機梭遍向園林織綺羅唯有黃鸝知此意才方偷眼又春過上堂舉溈山與仰山摘茶次溈云終日只聞子聲不見子形仰乃撼茶樹溈云子只得其用不得其體仰云和尚又如何溈良久仰云和尚只得其體不得其用溈云放汝三十棒拈云風不來樹不動溈仰父子互呈體用三十烏藤話已行萬牛回首丘山重結夏小參以主丈卓一下云通身無影像遍界絶遮攔裂破古今見成標致剛被釋迦老子曲設多門長夏九十日中逼得雄雞生卵可謂無影像重生影像絶遮攔再立遮攔既曰以圓覺為伽藍何處非安居之地視塵勞皆自己那些為可護之生是知清淨本然染因名相縱橫無礙泥在修持衲僧門下言之總不消得既然我輩喫佛著佛衣不可全說佛非遽革佛制興聖將錯就錯也者箇話端而今諸人行但行莫踏古皇道住但住莫守異草青坐但坐莫靠黑山邊臥但臥莫著淨地上何故長安雖樂不是久居復舉洞山夜參不點燈有僧問話退山令侍者點燈喚適來問話僧出來僧近前山令取三兩粉與之其僧拂袖而退因而有省僧遂罄衣資設齊三年後却來辭洞山山云善為時雪峰侍立次問云只如者僧去後幾時却來山云他只知一來其僧歸衣單下化去及來報山山云猶較老僧三生在拈云洞山與者僧絲來線去綿密可觀洎被雪峰一拶針鋒驀露只如衣單下化去因什麼猶較老僧三生在還會麼蝦為子屈靈隱前堂寮結夏秉拂退興聖歸提綱靈隱前天竺後平如鏡面險如崖衣單下钁頭邊揑不成團擘不破堪笑惠理三藏見處誵訛剛指面前一峰來自靈鷲所謂藍田射石虎誤殺李將軍殊不知世界未彰峭巍巍而獨露烟雲雖變青黯黯以常凝三期克證無越於斯九夏安居全憑者箇以拂畫一畫云且嗅土知機一句作麼生道風徑龍從泓底作月高猿出洞門吟夜來方丈舉琅瑘和尚示衆云汝等諸人來我者裡過夏與你點出五般病公案拈云琅琊老人慈悲之甚於四百四病中為人點出五般病可謂瞑眩之藥雖然如是檢點將來設若五病頓除其奈藥忌未忘去却藥忌道將一句來喝一喝師拈云點出病源琅琊不妨親切去却藥忌堂頭徹底老婆爭奈良醫之門病者愈甚就中有可調理底不妨進者一丸以拂敲床角一下云忌口忌口溫州鴈山能仁禪寺語録嗣法門人正從妙恩等編入三門示衆云未舉念周遊華藏未下足超越毗盧若道一法在門外笑倒文殊佛殿撥塵見佛佛亦是塵山僧腳布作炊巾眼不見為淨升座祝聖罷問答不録乃云法無定相擬之即差道不遠人突出難辨宛似雲開鴈宕奇巒怪石星布基分亦猶瀑瀉龍湫白日青天雷轟雨驟往往點而不到謾聽口耳相傳到而不點尤多只作目前境會不作境會却可商量千聖頭邊開眼一莖草上現瓊樓謝兩班上堂薄福住常雲生涯只任真燈籠懸露柱北斗對南辰法法皆依位機機合見人大家齊努力扶起破沙盆上堂悉達出頭來賣弄醜舉止雲門打不殺德山呵不起曉間園裡聽鶯啼昔日毗嵐今宛爾以主丈卓一下云於斯薦得同證如來淨法身其或未然空費蕩湫一杓水結夏小參生佛未分逈絶去來之相形名才兆遂興解結之端立箇圓覺伽藍破甑道箇平等性智碗脫丘盡底將來撥撒了也正好九十日內二六時中畫斷鴈山雲飽玩龍湫月然雖與麼更要問你常雲峰與載仁峰鬪額是第幾機自代云落七落八謝都寺幹結夏齊上堂湫寺雖然冷落更點且不失時但看前日結制事事頗合常規眉毛長短則未問以手握拳云如許大饅頭一人喫得幾枚良久云無人知此意令我憶楊岐解夏小參一言道盡硬似蠟人氷一著當機軟如鐵彈子渾崙無縫罅恍惚絶名模三賢十聖罔達此宗東土西天孰明斯旨縱使深深克證了了常知覿體全真是箇什麼以主丈卓一下云共汝問酬都不會相逢只解那斯祈復舉僧問雲門樹雕葉落時如何門云體露金風拈云雲門老子三句可辨一鏃遼空眨上眉毛早已蹉過能仁以的破的諸人急著眼看以主丈卓一下云中分債上堂三通鼓罷簇簇上來踏步進前索債相似若論索債近日張提轄李路分空倉竭廩了也有甚屎窖到你邊不必窮𤺊煎餓𤺊吵但聽主丈子將無作有別行標撥卓一下云鼠牙地穀粒粒如珍打尖量不盡只要兩平分連卓兩下十月半上堂幽壑鼓寒濤霜林木葉飄普通年遠事歷歷在今朝參冬至小參全提半提空中釘橛橫說竪說石上栽花竪起主丈云即此天柱一峰至竟無人道著若道得著便見氷河發焰鐵樹開花脫或不然轉作展旗峰與大衆觀看以主丈橫按云還見麼天地以此覆載日月以此運行佛祖以此出興衲僧以此消長卓一下云劄更用剪刀峯剪斷了也即今休去便休去欲覔了時無了時復舉洞山冬節夜請太首座喫果子次乃問有一物上拄天下拄地黑似漆常在動用中動用中收不得你道過在什麼處太云過在動用中山便喝令掇退果卓拈云黑似漆底鑞果一枚老不識差恣意賣弄若使太首座牙牀快利何處更有洞山冬至上堂初三十一中九下七今朝總入書雲筆以拂書空云大書特書兼屢書祖師兩眼黑如漆喝一喝聖節上堂臘月五無別語握起須彌槌打動虗空鼓五日風十日雨聖人作而萬物覩謝元藏主上堂一大藏教了無關鑰奇峰峩峩幽石落落撥轉機輪話已行到底不留元字腳元宵上堂謝道舊應都寺每憐紙撚搵無油將底光輝古蕩湫今日元宵時節至也還水上掛燈毬以拂擊左邊云箇裡點著同聲相應以拂擊右邊云者邊領去同氣相求一莖草上現瓊樓佛涅槃上堂胸摩卍字弄假像真槨示雙趺弄真像假柳垂金線舞春風演說涅槃猶未罷卓主丈下座越州九巖惠雲禪寺語録嗣法門人正從妙恩等編入三門示衆云門外門內一時分付若是俊流何必重舉佛殿老瞿曇沒記占慈氏機先埋通天界至雖然也須還我坐具地提綱嗚㖿嗚㖿賣弄小兒窮伎倆有麼有麼拖條斷貫逞風流盡情裂下不守故常索手出來別成活計主則始終主賓則始終賓咬定牙關八風難撼是以得無住本用不停機入佛入魔入大入小兔角丈頭開舜日龜毛拂上湧曹源卓主丈一下喝一喝復舉藥山久不上堂院主白云大衆久思示誨山云打鐘著大衆集定山下座歸方丈院主隨後問云和尚許為大衆說法因甚一言不措云云拈云院主只求黃葉藥山硬掗黃金一隊親到寶山剗地空手回去當時事且止即今作麼生又莫教新惠雲重重狼藉好當晚小參九仞巖前風吹石臼三家村裡牛動尾巴居常十箇有五雙似泗州人見大聖謾道缺齒胡深埋熊耳黃頭老活陷雪山殊不知當處湛然隨機建立從朝至夜對汝小參全彰鷺嶺真規漏綻少林妙訣有般漢聞得便笑新長老弗解上山斫棒祇來傍港撑船是則是不諱汝道忽若毗嵐捲地洪浪拍天又向甚處搏量以手拍禪床云放過一著復舉德山不答話公案拈云者僧是新羅人也怪伊不得德山威震雷霆爭奈令行一半者一半却聽新惠雲與他了却卓主丈下座上堂佛祖眼睛衲僧命脉觸境遇緣單重交拆卓主丈云挑花紅李花白結夏上堂拶透大圓覺平地沉山嶽翻笑刻舟人無繩徒自縛解夏上堂橫按主丈云四月十五結也如是七月十五解也如是此土西天皆同一致召衆云莫看漁翁把釣竿會須識取鈎頭意上堂冬節前後砂飛石走忽憶溈山兩鳳毛進前退後揚家醜畢竟九巖作麼生面南看北斗臘八上堂釋迦老子於臘月八夜星明月晝之時換得黑漆漆地眼珠兩顆從上以來更相拈掇莫知重輕試聽九巖將定盤等一等看以拂子作稱勢見得了也左邊擊床云左眼半斤右擊云右眼八兩上堂舉僧問曹山雪覆千山為什麼孤峯不白山云須知有異中異頌云言中彼此帶幽玄盡向言中辨正偏孤負一條官驛路茫茫沉在月明前謝珏侍者相訪上堂舉德山因廓侍者問諸聖公案拈云者箇公案切忌作得失是非論量正是猛虎出林引子𨁝跳恁麼批判惟證乃知脫或未然客路如天遠上堂中秋令節升堂指月卓主丈云眨得眼來楚天空闊開爐上堂舉南泉與杉山向火次乃云不用指東畫西本分事直下道將來杉山以火筯插向爐內泉云直饒如是猶較王老師一線道如前問趙州州遂打圓相中心下一點泉云直饒如是猶較王老師一線道拈云挑灰撥火不無三大老兒若論本分事說什麼猶較一線道直是未在結夏小參十方同聚會瞎驢趂大隊箇箇學無為眉上更安眉此是選佛場屎窖立封疆心空及第歸癡鈍者還稀龐公頂枚烏紗帽子自謂十分氣槩驀被惠雲捋下無地掩羞非是抑他威光減他聲價比論曹溪路上烏得有此俗談須知山河大地是沙門自己光盡十方世界是沙門一隻眼無為作麼生學佛又作麼生選才涉思惟百裂了也說甚心空及第九夏安居不與麼時如何拍禪床云放下便了上堂德山棒臨濟喝喚作衲僧巴鼻妄生芽蘖不喚作衲僧巴鼻臨河呌渴去此二途如何道得一句與古人相見拍床云仲夏極熱九月旦上堂參玄衲子應舉書生陌路相逢較量勳業一人道我於七尺單前著力一人道我已十年窗下加工加工者何乃曰選官著力者何乃曰選佛閉門造車雖異出門合轍一同惠雲未能詰問應舉書生且要勘辨參玄衲子㘞達磨大師是你主文出甚題目莫有祗對得底麼喝云早已批白臘八上堂黃面老初成道誇詫一場相鼓倒雪嶺峨峨雪未消星河湛湛星猶皎諸人冷地眼開時莫似貧兒拾得寶上堂一年十二月過了無多日乃事竟如何茫然黑似漆休休休空悠悠前許多時何處去大寒然後索衣裘佛涅槃上堂岸柳駸駸緑巖花漸漸紅摩胸一段義舒卷在春風分明點與諸人了切忌朧在夢中上堂古者道說法不應機盡是非時語所以應下機人宜說世間法應中機人宜