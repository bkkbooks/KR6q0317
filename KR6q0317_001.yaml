乾坤而獨露拈主丈左邊卓云者邊會得如日麗天右邊卓云箇裡明來猶水赴壑以此剗除一切以此成就二嚴以此安帖三邊以此平章百姓分珍羞於香積劄妙喜於針鋒大用現前功歸何所千歲鶴翹松月冷半間人對竹窗明上堂鳴鼓了也燒香了也諸人合下便見是大寒節候又待老僧掉三寸舌豈非雪上加霜謝寮元并道舊上堂旃檀藂林旃檀圍繞荊棘藂林荊棘圍繞荊棘藂林旃檀圍繞旃檀藂林荊棘圍繞透者四重關了許伊作箇本分衲僧且道甚人透得無面目黑皴衝開華頂月踏破石橋雲卓主丈謝石坡和尚相訪上堂吳山青越山青揖讓分賓主低昂見弟兄中間一句風靜潮平滿堂皆顧陸捉筆畫難成新承天一如和尚至上堂拈主丈云灌頂雲收峩眉月晝父翁一片肝腸宛如生鐵鑄就弟應兄呼全機漏逗旦道漏逗箇什麼蘇州菱邵伯藕卓主丈上堂春山疊亂青春水湛虗碧豁開樓閣門分身千百億一念差雲善財無路尋知識佛生日上堂撞出娘胎海嶽昏指天指地若無人年年傾盡西湖水難洗瞿曇滿面塵上堂不是心亦非佛玉兔東升金烏西沒循環不暫停究竟知何物那箇男兒腕力強一槌擊碎精靈窟卓主丈一下臘八上堂雪山高幾何矗矗在天表咄哉竺土仙六年登不到登得到絶之繞背手摘南辰下視衆峰小謝泉州承天木禪和尚并法石上堂拈主丈卓一下云石說法又卓云不談禪句句皆含妙明明不在言難將耳聽只貴心傳此外別求玄路入洛陽橋上望長安佛誕日上堂瞿曇出母胎膽志大如斗方學小兒行便作獅子吼水在湖杓在手乘時蕩向無何有也勝雲門老古錐藥囊空掉喪車後結夏小參拈主丈云衲僧性命宗社紀綱把定放行總由者裡橫按主丈云若論把定青山不敢青白雲不敢白如將布袋一結聖凡喘氣無門卓主丈云若論放行洞深鳴水樂湖淨疊荷錢是皆圓覺伽藍儘可安居受用只如不把定不放行一句又作麼生靠主丈云唯有子規知此意聲聲啼破月三更復舉黃檗問百丈從上宗乘如何指示丈據坐檗云後代兒孫如何傳授丈云我將謂汝是箇人便歸方丈拈云黃檗踏步進前不辭落節雄峰愛忘其醜肯顧傍觀雖然隨即彌縫必竟難瞞衆眼何以見得師子教兒迷子訣擬前跳擲早番身謝知事維那開長生庫上堂楊岐家法森嚴人無異議興化棒頭峻硬禍不單行假二老之梯階開一乘之庫藏卓主丈云梅雨過竹風凉湖光淡蕩芰荷香咄狼藉不少八月旦謝書記殿主上堂東去西去南來北來銅頭鐵額馬面驢腮毫端上打𨁝跳燈影裡舞三臺演福且搭箇樣子要得好親見一回卓主丈云睡眼朧擘不開九月旦上堂衲子奔相看相看莫相負飲水須貴脉入門富辨主問訊時揖茶處總為諸人開活路若是謝三郎揚眉便歸去卓主丈謝法眷前仰山愚極和尚至上堂舉仰山問雙峯云師弟近日見處如何公案拈云參師莫若參友輸他仰山雙峰只不合立知見分能所今日仰山師兄若問演福見處直得無言可對無理可伸雖然亦未免疑殺天下人元宵上堂召大衆云東家點燈西家暗坐一樣元宵生涯各做暗坐底默默提撕點燈者明明照破照得破是什麼拈主丈卓一下云海壇馬子似驢大溫州江心龍翔興慶禪寺語録嗣法門人守靜妙恩等編據方丈云了了無言驀胸一拳蜃江水急不許泊船拈省劄云大化樞機中流砥柱歸吾掌握當見設施驀值狂瀾時如何乃云劄提綱法隨法行法幢隨處建立昨居演福祇知山中法門水樂喧闐風篁迭奏空谷答金鐘之韻疏林度樵子之歌今到龍翔又見江上境界波光蕩漾烟棹交橫譙樓傳畫角之聲風順𮞏漁人之唱雖則溪山各異畢竟雲月是同心佛與衆生是三無差別正與麼時引得了菩薩出來道三千年黃河一度清當晚小參隔江招手只可撈蝦舞棹呈橈不中餵狗縱有䞉懷香餌垂萬里鉤瞥過重溟布漫天網爭奈設心圖大撞著水寒夜靜月明滿船空載所以山僧到此一波未動片甲纖鱗聽其自若何故深水取魚長信命不曾將酒祭江神復舉趙州晚參云今夜答話去也有解問者出來時有僧出作禮州云此來拋磚引玉只引得箇墼子拈云金將石試玉將火試人以語試者僧未曾開口便道是箇墼子何耶若不酬價爭辨真僞次日高庿殿升座云萬物為己烏有自他四海為家曷分邊表江月洞開金闕松風常闡玉音處處稱尊頭頭顯妙聖量泯除超佛國恩波流衍福皇圖結座追憶仙遊輦未還特輸忠赤舉風幡掣開玉殿黃金鎖最忌當頭觸聖顏謝兩班上堂江上山山上寺門對斗城開東西分兩序總不得動著何故是法住法位世間相常住端午上堂今朝五月五及時道一句無山可採藥有水堪競渡江心如許大龍舟聚集梢郎同駕御彼岸不著此岸不居只箇中流住無所住機先奪得錦標歸石女木人爭起舞謝報恩兜率奚翁東耕二法眷相訪上堂巾子峰頭雲開雲合龍翔江上潮落潮平師承底事的的分明風前不必兄呼弟見後毋勞弟應兄上堂舉正覺逸和尚道憶得老僧年七歲時於村校書處得一法門超情離見絶妙絶玄若欲傳持宜當諦聽高厚耕種罷牽牘負薪歸深夜一爐火渾家身上衣諸禪德逢人不得錯舉師云老僧昨日因雪未免引古牽今憶得自家年三歲時亦在強褓中受一妙義拆妄窮元不空不有要明端的須假心聞春雪滿空來觸處似花開不知園裡樹那箇是真梅諸上座逢人但恁麼舉涅槃上堂摩胸告展腳示有來由沒巴鼻佛滅二千年比丘少慚愧愛雪峰請提綱建法幢立宗旨既承師訓合聽官差且宗旨法幢作麼生建立行船同一命方屯飛虎於江心打鼓召三軍又布長蛇於雪嶺海宇頓清猶帶甲心王親覩始休兵福州雪峰崇聖禪寺語録嗣法門人慈證妙恩等編指三門云無門之門須得門而入無意之意須得意而通彈指云會麼一扇西兮一扇東佛殿燒香云舉手拈香低頭作禮我為法王於法自在據室拈主丈云頑鈍以此銷鎔偏小以此彈擊直中曲曲中直老盧不會達磨不識拈省劄云一劄當頭無咽喘氣大鈞播物易地生春佛祖都來聽處分提綱落賺鰲山贏得話行千古單提鱉鼻莫知傷中幾人而今屬我權衡且要摟伊種類揀開眼底拖拽數條一條輥動蘆花通身紅爛一條震驚帝釋滿面慚惶一條穿七箇蒲團橫尸當路一條入九重城裡轉尾作頭更有一條突出難辨再三翻覆看元是萬年藤卓主丈一下復舉裴相國見石霜霜奪相國笏問云在天子手中為圭在官人手中為笏在山僧手中喚作什麼相國無語乃為留下拈云為圭為笏強立名模相國知機未肯人前輕漏泄石霜逞俊得便宜是落便宜當晚小參日月輪邊挨肩插足魚龍穴下錯節盤根固知屈辱宗風正定難逃化造輥上六花峯頂拶開千聖妙門論相見時早遲八刻不見道望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也雖然豈知新長老未渡飛鸞與諸人相見久矣畢竟以何為據不見道千里未是遠復舉三聖問真覺祖師云透網金鱗以何為食祖師云待汝出網來却向汝道三聖云一千五百衆善知識話頭也不識覺云老僧住持事繁拈云微三聖聱頭莫禁鱉蛇之口微祖師海量爭容透網之鱗道箇住持事繁可煞慣得其便除夜小參田園穩密運足焉知路危游戲神通掉頭不顧屋漏逗到年窮歲盡總皆手亂腳忙會須明自己而了目前還是了目前而明自己得體得用似車有輪全主全賓如鳥有翼卓主丈云青霄直透無留礙大道橫推儘自由復舉藥山和尚夜參云我有一句子待特牛生兒却向你道時有僧出云特牛生兒也只是和尚不道山喚侍者點燈來其僧便抽身入衆拈云藥山近夜潑墨者僧露影藏形檢點將來二俱不了何故只有照壁月且無吹葉風上堂語是謗默是誑語默向上一機佛祖聞而膽喪曾郎輥三箇木毬德山揮一條白棒盡是弄精魂呈影像何似腳指築著挨門拶著卷簾見著堪作衲僧榜樣擊拂云一聲鶴唳千峰上元宵有雨謝天童環溪和尚上堂拈主丈云太白峰頭月寒泉水底燈清光分上下千里恰同明同明且止畢竟燈因誰𦦨月自何升卓主丈云一點不來翻夜雨難謾迦葉老師兄謝衆寮修造并開田上堂拈主丈云烟樹斫開曉月掛簷嘶木馬嶺雲耕罷春風吹雨吼泥牛聲前領會無差共樂法喜禪悅卓主丈打刀須是邠州鐵上堂今朝三月十五眨眼又見春暮尺璧難酬寸陰白日豈宜虗度可憐杜宇一聲聲啼得血流無用處佛鑑忌拈香云仰天灣下喝石嶺頭昔年落賺覆水難收當堂稱父子背面是冤𬽦影也不願再見豈料界隨相逐同到福州莫莫莫休休休粗香強撮土說破不為讐結夏小參以圓覺為伽藍頭上著枷腳下著杻認虗空作正體東西不辨南北不分歷百二十日之長期融過現未來於一念猶是困魚止濼鈍鳥棲蘆直饒跨得雪峰門升得雪峰堂入得雪峰室見得雪峰人向道未在乃云莫謂此中山勢險前頭更有最高峰復舉當山真覺祖師道盡大地撮來如粟粒米大拋向面前漆桶不會打鼓普請看拈云看則不無還知雪峰立腳處麼如定當得出鱉鼻口裡正好安居脫或未然一任東卜西卜上堂十方國土中惟有一乘法如何是一乘法梅雨過芰荷香薰風殿閣生微凉會麼下座巡堂喫茶上堂平明始立秋冷已到山頭談風說露兮蜩蟬嘒急詠砌吟墻兮蟋蟀聲浮不作佛法商量不作時景話會舉手云觀世音菩薩將錢買胡餅放下手却是生鐵一塊上堂九日正當期登高報衆知黃花到處有豈獨在東籬難逢美景採出一枝竪拂云見麼觸目無人明此意何妨自插滿頭歸便下座冬夜小參拈主丈云烏石嶺頭時時相見三毬堂下歷歷播揚格外談冬來事吉凶卦兆盡現己躬多不添一絲少不減一線只為元無智眼淪入邪途隨運以推移共陰陽而消長莫有挨開天地揑定陰陽底麼橫主丈云一冬二冬叉手當胸復舉定山和尚見首座洗衣次山問作什麼首座提起衣山云洗底是什麼衣座云福州使鐵錢定山喚維那移下挂搭拈云雪峰從來扶弱不扶強偏愛斷者公案定山機鋒少密平地起堆首座浣濯自如辱而不屈謝兩堂秉拂上堂洞山首座喫果子開口落空亡雪嶠兩堂吞栗蓬分頭張意氣衲僧家手是稱眼是稱輕也知重也知半斤八兩毫髮無虧雖然爭奈未明三八九難辨力㘞希擊拂下座正月城歸上堂金烏飛玉兔馳歸來重會面動是隔年期鼻頭垂下元如舊三昧依前各不知散經上堂舉昔有婆子請趙州轉藏州繞禪床一匝傳語云轉藏已竟婆云比來請轉全藏如何只轉半藏拈云趙州轉藏動必全真婆子開緘語驚時聽從前汗馬無人識只要重論蓋代功十一月旦上堂傍家覔佛著相參禪何異釣魚於山上聽水於爐邊三冬今去一眨眼過殘年翻思少室庭前雪惟有神光得正傳謝承天并法石上堂迦葉倒剎竿熱謾慶喜玄沙乞主丈鈍置雪峰爭似我與承天法石相會不倒剎竿不付主丈一見各自西東何故如此恐貽知己哂盡在不言中西禪柏堂和尚至上堂兩浙江頭屢呈烟棹大溈堂上又展泥盤得處深用處活中峰直下兒孫必竟出場自別別底事作麼生卓主丈云君子可八謝前堂豐山首座上堂人天眼目佛祖淵源如合浦夜光水澄即現似豐山九耳霜降即鳴若論快便難逢由是未忘所待莫有不因光而自現不因鳴而自聞底麼乃云三生六十劫涅槃上堂釋尊初出世時將那一著對天地指注了也及至後來收拾不上却道始從鹿野苑終至跋提河於是二中間未嘗談一字瞞得阿誰既曰我寧不說法疾入於涅槃又乃胸摩卍字槨示雙趺熟睡饒譫語此等膏肓之疾作麼生醫若也醫得便見桃紅李白真體湛然其或拱手相看過去久矣觀音生日提綱洪鐘在大扣大鳴小扣小鳴皓月當空東來東照西來西照猶如菩薩入三摩地現諸色身慈眼視衆生福聚海無量拈主丈召衆云者箇是主丈子那箇是觀音且聽雪峰因齊慶懺卓主丈云風暖鳥聲碎日高花影重復舉歸宗因僧問和尚豈無方便令學人得入宗云觀音妙智力能救世間苦僧云如何是觀音妙智力宗敲鼎蓋三下云還聞麼僧云聞宗云我何不聞僧無語宗以杖趂之頌云三聲鼎蓋普門開苦海勞生喚不回九十春光今又半空飛花片點莓苔三月旦上堂清明前寒食後處處掃松家家插柳祖意甚分明茫然不知有三皇冢上絶人遊芳草連天髑髏吼月望謝仰山愚極和尚上堂舉仰山因景通上座參山閉目坐客至無茶點蒿湯備禮儀通曰如是如是西天二十八祖亦如是中華六祖亦如是和尚亦如是景通亦如是隨風倒拖語訖向右邊翹一足而立弄假像真仰山起來打四藤條養子方知父慈通因此自稱集雲峰下四藤條天下大禪佛蝦䗫跳上稱未住時曾到霍山亦如是言天下大禪佛參霍山呼維那打鐘著通便走平地咬交頌云集雲法令不徒施趂起丹山白鳳兒昨夜已飛霄漢去平明空撼碧梧枝上堂打牛即是打車即是一種無絃琴彈落知音耳委不委曹娥讀夜且較三十里結夏小參心王寧六國清百川潮落四海浪平其如轇轕情塵當遵古佛制若也沉昏道眼還待臘人氷心王遼邈孰覩其形記得柏巖問洞山觀察使姓什麼不委他姓名什麼不委他名殆傳尊貴語舉目隔神京相留過夏曲徇人情往往都來缺一程端午上堂召衆云眼若不睡諸夢自除心若不異萬法一如佛也無魔也無今朝五月五何用釘桃符六月一上堂拍禪牀云直下便瞥炎天降雪當今蹉者一回前面煞有酷熱那堪鐵彈鑄未成臘人氷不結屈指云且過六月七月八月更聽松風動寥泬中秋上堂世事悠悠美景難留不可𥨊於長夜須來共賞中秋卓主丈云天宇淨桂花浮一片月生海幾家人上樓重陽上堂重陽節何可說籬菊新開剪剪金霜柑微露團團月元亮攢眉回去見境生情閩王特地緘來弄巧成拙卓主丈處處登高看不徹冬夜小參拈主丈召大衆云兩肩擔不起壓倒世間人覿體常現前知他是什麼縱使六陰塞戶無缺亦無餘假饒一氣轉鈞同明復同暗瞿曇廣說達磨直指詰其端由全沒巴鼻驀見陽生第一爻九九元來八十二卓主丈冬節上堂一陽生飄瑞雪喚轉鰲山底時節鐵樹開瓊花烏龜變白鱉普賢眼裡重添屑上堂空中一片雲起滅渾無定或要下筆書或要用釘釘拈主丈云竹杖拈來畫斷休免得年年為話柄以主丈畫一畫下座達磨忌拈香我此震旦人到底少意氣放伊過界來波濤起平地直指單傳有甚巴鼻提起香云神光因為這些著了娘生隻臂且道是旃檀是驢屎等間一嗅腦門開二十八代西天記再住雪峰崇聖禪寺語録嗣法門人宗永妙恩等編據室召大衆云前時向者裡抽釘楔而今却要添釘著楔前時向者裡解粘去縛而今却要添繩加索雖然如是罕遇奇人提綱夢繞寒窗方得投間之計日臨西崦忽聞剝之聲正與麼時如何排遣把定固知不可放行那免周遮瞥下龍翔還登象骨所以法無定相遇緣即宗大地撮來盡是諸人命脉三毬輥動再張舊日家風鱉鼻上橫身干戈中立腳若不如此爭見升平然則正令當行功歸何所卓主丈云天上有星皆拱北人間無水不朝東舉朱行軍入南際寺齊僧口不住云直下是直下是有濟上座便問直下是是箇什麼行軍便喝濟云行軍幸是佛法中人惡發作麼行軍云你作惡發會那濟便偈行軍云鈎在不疑之地拈云朱行軍威掩萬衆特露太阿濟上座氣蓋諸方不顧性命選佛若無如是眼宗風爭得到于今當晚小參挾復歸方丈有條攀條打鼓令三軍無夢說夢小參答話不答話爭逞英雄出則為人不為人冬護疆界從頭按下換水養魚氷泮斷崖翻調雲門之曲梅開雪嶺再回少室之春句外明宗何當辨的卓主丈云蕩蕩一條官驛路寅昏曾不礙人行舉玄沙問雪峰大用現前時如何雪峰以三毬一齊輥動玄沙作斫牌勢拈云回天關轉地軸有是父必有是子絶岸素非好手也要效顰拍禪床云不知誰是斫牌人元宵謝兩藏主上堂拈主丈云大藏小藏盡從者裡流出放去千燈萬𦦨收來一月當天只如不收不放一句作麼生判斷卓主丈一下云上元定是正月半普請摘茶上堂溈仰兩爺兒採茶機對機只知呈體用不覺露槍旗正值風和日暖何妨把手同歸子規啼破已多時上堂踞菩薩乘修寂滅行者上間挂搭出佛身血破和合僧者下間鋪單雷同過夏且從出格安排未可何故蓋渠能修不能破能破不能修欲窮千里目更上一層樓上堂始見桃花李花又見榴花藕花金色頭陀已歸雞足靈雲老子杳隔天涯安得風流出當家結夏小參萬法是心光和泥脫墼諸緣惟性曉認奴作郎本無迷悟人只要今日了迷悟本無了箇什麼䗶人為驗分明待兔守株鐵彈稱功倣佛隔靴抓癢舊來活計等與平沉但以九旬通為一夏路遠夜長休把火大家吹滅暗中行舉雪峰道籮邊坐餓死海水裡浸渴死玄沙云籮邊坐餓死漢海水裡浸渴死漢雲門云通身是通身是水拈云飢逢膳不餐渴見水不飲為伊無下口處則且置既是通身是通身是水因甚也渴死餓死試定當看涅槃上堂娑羅雙樹間瞿曇展腳睡一睡二千年而今醒也未醒了也足觀瞻打圓相云山花開似錦㵎水湛如藍真覺忌拈香象骨飛氷片鰲山吃雪團家風嚴冷甚覷著骨毛寒聲價騰今耀古馨香炙地薰天插香云年年不斷一爐烟上堂見鞭影而行已非良馬聽板聲打坐豈是禪流參須自參悟須自悟少林孤坐接神光更無一句間言語中夏上堂光境易消磨看看中夏過長連床上客本分事如何以拂子擊繩床云本分事沒回互石梯侍者曾有言某甲實是上堂去參上堂藥山久不上堂石中蘊玉院主率先啓請眼裡無珠昧一己而且從誤三軍尤可憫大似𮭗𮭗鳥守空池魚從腳下過𮭗𮭗總不知召大衆云逢人但恁麼舉冬至上堂舉溈山問仰山仲冬嚴寒年年事運推移事若何仰山進前叉手而立師云腳下泥深溈山云我情知你答這話不得師云欲隱彌露香嚴云某甲偏答得這話師云節外生枝溈山理前話香嚴亦進前叉手師云慰斗煎茶不同銚溈山云賴遇寂子不會師云未必心頭似口頭復云還知溈山落處麼家無小使不成君子城歸上堂嗟末法惡時世諭之向上關略不點頭說及龍華會何曾抽採但見需撒花索苗米惱得頭白逼得面黃留香一鉢飯渾是皺眉糧今歲上供銀未解來年新底又催綱拍禪床云歸堂快合休糧方除夜小參夫為參學一箇箇得似大軍臨陳將五陰魔六結財一刀兩段天平地平其或今日明朝進寸退尺非特家財被虜亦兼無處逃生逗到年終凍殺餓殺大衆臘月三十日也閻羅王勾我也古人與麼道正是自傷己命打水魚疼然而一藥千金且作死馬醫看以拂擊床云路遠夜長休把火大家吹滅暗中行上堂舉玄沙上堂衆集定以主丈一時趂下向侍者道我今日險入地獄如箭侍者云且喜和尚再復人身拈云黃檗樹頭求木櫁玄沙枉費精神釣魚船上助歌謠侍者堪稱良佐只如今日衆集雪峰又且如何合掌云珍重便歸方丈上堂我宗無語句實無一法與人旱地鞭雷我空手去空手歸青天撒雨周金剛與老曾郎有是父兮有是子何故甜瓜徹蒂甜苦瓠連根苦上堂舉南泉示衆賣身公案拈云王老師行畜生行賣弄赤窮趙州面諾布衫又是明年方做既已無人酬得價只堪分付與園頭結夏小參盡大地是沙門眼竪四橫三遍十方皆自己光通上徹下克期取證含元殿裡猶問長安握節上來黃檗樹頭討甚木櫁放下即為圓覺馳求便不安居覿面一機急須薦取門前有箇長松樹夜半子規來上啼咄舉藥山謂雲岩云與我喚沙彌來岩云和尚喚他作什麼山云我有折腳鐺子要伊提上挈下岩云恁麼則某甲與和尚各出一隻手山休去拈云藥山索鹽雲岩奉馬父子一家風流儒雅我也有箇木毬亦要輥上輥下顧視左右云沙彌在麼良久云出手不來還成滯貨拈古舉幽溪因僧問大用現前不存軌則時如何溪繞禪床三匝而立僧擬進語溪與一踏僧歸位立溪云汝恁麼我不恁麼汝不恁麼我却恁麼僧擬進語溪又與一踏云三十年後吾道大行師云這僧撩撥蜂窠軃身弗及幽溪弄場戲劇栓索俱形到頭不解翻交終竟負他兩踏舉洞山同密師伯訪柏岩公案師云客路如天遠非柏岩老子不能納洞山侯門似海深非洞山不能見柏岩老子若論開粥過夏因甚密師伯也得相留不見道一人在朝千人緩帶舉黃檗上堂衆集定以主丈一時打下復召大衆衆回首檗云月似彎弓少雨多風師云打將下喚教回黃檗可謂老婆心切是時若得一箇半箇擔荷豈不快哉而今檢點將來彼此翻成鈍置舉藥山久不上堂公案師云院主可煞懞懂誤他三軍始報打鐘著豈不是正宗分衆集便歸方丈豈不是流通分因甚推道經有經師論有論師還知藥山落處麼菩薩龍王行雨潤遮身更上數重雲舉僧問龍牙和尚十二時中如何用力牙云如無手人行拳石門云如無舌人解唱歌始得師云惠雲也有箇道處如合眼跳黃河且道三人中那箇合轍若辨得出免你陰界藏身舉趙州和尚示衆云老僧除却二時粥是雜用心處師云大衆不知這老漢粥飯之外正當在那裡著到若也檢點得出許你與趙州把手共行脫或未然縱便十二時中純一參究亦是雜用心處必竟獨脫一句如何稱提好同霜夜月任運落前溪舉達磨西來不立文字直指人心見性成佛六祖云祖師說箇不立早是立了也師云嗄又是鈔解疏疏解經要扶直指宗綱三生六十劫畢竟如何卓主丈喝一喝舉僧問靈雲君王出陳時如何雲云郭璞葬熊耳僧云意旨如何雲云坐見白衣天僧云當今何在雲云莫觸龍顏師云者僧不顧危亡挨開陳腳靈雲欣逢快便引出駕頭子細檢點將來可惜遇而不遇舉僧問趙州如何是不遷義州以兩手作流水勢其僧有省師云趙州機鋒迅捷用力太過者僧啐同時敢保未徹或有人問演福如何是不遷義只向他道放下著知麼免得𮞏相負纍舉資福和尚因僧問學人乍入叢林已經一夏未蒙和尚提誨乞師一句福云老僧自住持已來未曾瞎人眼師云這僧只求一句資福便答兩句猶道未曾瞎人眼在瞞得阿誰頌古世尊降生右脅翻身已怪哉那堪便解舞三臺做模打樣無端甚寧免傍觀臭口開升座說法當堂據坐寶花牀真相從來本自黃百萬參徒誰不見何須重把紫金粧鷲嶺拈花靈山結舌舉花枝迦葉難瞞展笑眉接響承虗到今日兒孫棒喝競交馳雙林入滅覆水難收滿竺峰如何臨死更摩胸說無說有成生滅併付春風一夢中外道問佛鞭影非惟示阿難敲空作響孰知還當時未必皆良馬應妬清風起赤幡院主問病撥開日面與月面倣佛前三及後三病在膏肓重爝艾昏兜院主可無慚文殊領衆問疾望見毗耶彼上人十中有九喪精魂只消一箇渾崙石打破群賢不二門魔王問金剛齊菩薩千年相逐太無知你道金剛齊是誰如是住時休說破從教老漢自生疑七處徵心七處徵它天外天毫光直射阿難肩瞿曇忒煞憐兒切逼得鮎魚上竹竿八還辨見還還還後更無還一箇間人天地間昨夜大蟲遭虎咬皮毛落盡體元斑經題以字不向經頭識本真紙堆討甚法王身未開梵夾承當去免作循行數墨人有句無句有句無句藤倚樹大似旱天開水路正當樹倒與藤枯看看平地波濤注香嚴上樹上樹垂機值虎頭自知覆水已難收猶能覿面呵呵笑轉却三春作九秋臨濟三頓棒三番痛棒打驢腰直往高安一欵招急水灘頭番巨浪信知家富小兒驕示衆別傳一脉漲曹溪萬法都來和不齊葉落歸根至今日江南猶有鷓鴣啼法語示宗度禪者釋迦不出世達磨不西來佛法遍天下談玄口不開古人曲盡慈悲啓此直截之徑操履有凖後學所宗往往不本其由癡狂外走參禪學道是外走尋言逐句是外走從空放下近世罕聞老僧開堂於演福之時間有幾人度亦一數辛未秋遷江上次冬登雪峰甲戌夏客南山太清此兄屹然居于無量福海八風難撼較他褪花杏子逈爾不侔所謂霧豹澤毛未嘗下食庭禽養勇全待驚人倘能終始一如老胡有望示靜侍者夫撥草瞻風之士究竟為何必慮生死輪回要明生佛未具一著子擬於靜處尋覔他却在閙處蹲身更從閙邊尋他又在靜邊立地若欲置之無事甲裡又是一件活鱍鱍底物如何便搆得伊倘能動靜一源古今一致再三磨礪勿以歲月為拘自然秋水澄渟金波頓現照破山河大地萬別千差但緣氣質不同利鈍有異豈不見老東山答部使者柏樹子之問頻呼小玉元無事只要檀郎認得聲是時圓悟為侍者觸著便轉遂有投機頌云金鴨香銷繞翠幃笙歌叢裡醉扶歸少年一段風流事祇在停針不語時可謂是俊快之流也靜侍者覔語故書大槩而酬之若是伶俐衲僧一臠便知鼎味靜宜審之示瑩禪者直指之道豈涉語言才涉語言便成曲指古人稱達磨西來為賣卜漢掇轉卦盤則吉凶悔吝盡在汝躬以此可知心是自家本有之心佛是自家天真之佛面目現在瑩徹無瑕罔究其源只看畫樣孰肯退步就己以古為期豈不聞趙州有言你𢬵十年不語若不參得禪截取老僧頭去作屎杓可謂病多諳藥性經驗始傳人瑩禪還信得及麼若信得及便請覿體承當打破漆桶示真知客一切語言是提婆宗開眼入他群隊百草頭邊有祖師意長時掉在空間可憐末世宗徒往往相仍若是所以少林一脉命似懸絲今則賢聖隱藏孰能援臂一真知客曾辦事於長庚資質可觀烏得皮下無血剗借老僧鼻孔出氣而自欺自昧者哉與其一種平懷泯然自盡便可去却藥忌盡力道取一機不然塞斷咽喉孟浪通一口氣即見迦葉門前清風浩浩曹溪路上白浪滔滔自然八面玲瓏圓滿一真法界頭頭物物盡聽處分撿點將來豈為休歇之地何故長安雖樂不是久居示真禪人號癡叟有一衲自巾峰奚翁席中來名真號癡叟訪余覔語以證其癡如此則真得其癡耶若真得其癡必須眼見如盲口說如啞枯形垢面與世偕忘苟或不然未可執豫言為實也王老師道如斯癡鈍世且還稀真不負余期請於古人葛藤中默默自照示際山心長老祖師心印狀似鐵牛之機靈山首露鋒鋩迦葉微笑是此印也少室密形圭角神光倒戈亦此印也自後祖祖相傳心心相印或因甜而說蜜或因蜜而說甜謂言機似鐵牛又安知鐵牛之機作何形也太率參禪問道聞說一物須尋一物之所在聞舉一印須究一印之方圓若從口角上明影子邊邈宛似福州發足要取長安大故遠在豈不見百丈再參馬祖將謂別有奇特別有異聞驀被截斷腳跟震威一喝直得耳聾三日印文裂開高踞大雄網羅俊乂溈山黃檗皆被羅籠一人聞背觸以翻身一人聞耳聾而吐舌其餘諸子終不若此二難所謂見與師齊減師半德見過於師方堪傳授倐逾一十四代密庵出焉四翁鍾秀於三山吾道盛行於千古直下一派惟岑山正續二師迭奏𡎖箎聲猶在耳記得古人有語莫住城隍寺舍須向深山裡钁頭邊尋取一箇半箇以為種草奈何魔強法弱事與願違偶福州際山德心長老千里投誠未及關防隻腳已跨門裡鍋兒大小杓柄短長一一被它覷破心乃前淨慈潛庵老子嫡裔水有源流了知印不離心必解隨機應用所以道三要印開未點窄未容擬議主賓分要作臨濟兒孫當如是矣示小師九峰長老鑿池勿憚工夫工夫圓而月自現應世當觀時節時節至其理自彰九峰長老名福成以月池自號依余未久連董兩山咸稱時至理彰池成月現殊不知隨業受報而致于茲若論克志遠期大不侔也喻如霧豹澤毛未嘗下食庭禽養勇意在驚人以此較之烏得無愧雖然如是古人多因住院之後方參得禪既曰有條攀條亦可將勤補拙其不然者何緣服衆耶更能儉以律身寬以待物勤修造辦堂厨乃住持之常分況今佛法凋謝妄稱人師境風扇搖易為流俗要人宗仰自須特立獨行生子當如孫仲謀小師得似保福展垂名後世可不勉諸示善藏主迦文廣說達磨直指且道說箇甚麼指箇甚麼若是上根利智點著便知其次克志參尋亦可薰習而況年來師友泯滅佛祖蔑聞邪正兩路不分藥病二語不辨茫茫蕩蕩儱侗真如孰知禪自禪道自道性自性心自心耶記得五十年前在冷泉作夏這邊打坐禪板下竺鳴開講鐘禪教爭衡宗說並駕莫擬今夏有此消息也無從善藏主昨依豫於雪峰嘗煩歸侍司一向坐病且不曾為蛇畫足比同還浙各自東西彼此渾無一言幸自好箇直指聿來覔語胡為自生鈍鑕者哉退思從上作家如德山入龍潭門便言潭又不見龍又不現潭曰子親到龍潭這裡正好焚鈔待吹滅紙燭方始瞥地已過幾箇節文臨濟扣黃檗佛法大意三度被打於此正好翻交等大愚點發回頭早遲了八刻後來二師行棒行喝便能於無佛處稱尊殺活自由不存師教作千古參禪徹佛祖巴鼻底樣子善也雋敏不言而可知萬一見義勇為應道彼既丈夫我亦爾示禪人祖師門風廣大非上根猛烈莫能造詣除却西天四七唐土二三自餘天下老和尚具超師之作者古今獨羡臨濟德山數人而已如黃檗云不道無禪只是無師之謂也且如德山據一條白棒佛來也打祖來也打自天皇龍潭直下何曾有此作耶不出自性宗通臨濟一喝如旱天霹𮦷橫也揍它不得竪也揍它不得這箇從百丈黃檗直下却有些子源流到它分外起滔天沃日之浪所以八傳而至東山聲名愈震方自三十年間遽爾瘖沒汝今出一叢林入一保社莫問有禪無師但能一切放下以古為期立堅固心奮山力驀劄地如水底火發似崖石崩接續別傳一些子氣脉使迦葉出畢鉢羅岩達磨再還東土詎不韙歟宗門樞要不在出一叢林入一叢林衲子紀綱何消舍一知識取一知識使其隔墻見角者了然而可知更欲形之於語言好似戴嵩畫牛逼真終非活牛也嘗聞祖師言教是整頓時人手腳手腳不蹉毋勞整頓祖佛言教是療狂子之方心神不狂毋勞治療惟有緊切二字當與識者言之不明自己無以敵死生不了目前那能辨邪正邪正已辨則由汝七縱八橫自己既明任你東湧西沒只如普賢道不見一法是大過失永嘉道不見一法即如來差別兩關作麼生透豫昨謝事雪嶺屏跡岑山適樞上人扣門講二十年之舊我方獻它新羅附子它便酬我舶上茴香既善知時故書大槩以塞其請讚出山相峭巍巍孤逈逈弃王宮棲雪嶺分明凍得眼生星幡然踏破千峰頂觀音觀以耳觀聽以眼聽道不虗行谷不虗應施無畏之力滅煩惱之病與諸佛同一慈心與群生共一悲命若非菩薩超越世出世間焉能獲二殊勝聲色海中隨波發現駕一葉之優曇開普門之方便洛伽山慈悲岸無十萬億國之遠思惟相聲以眼聞色以耳見萬法融通六根互換作是思惟時十方佛皆現達磨二萬里見梁王無風波浪起不得一莖蘆幾乎沉殺你一無聖二不識忠言逆耳投江北入水見長人梁王方失色千古萬古空相憶布袋兜率宮長汀市逆行順行誰弗識你有些滯貨不能藏到處逢人亂拈起未下生先行腳袋却乾坤簸弄自若一汀流水白漫漫杖子何曾探得著破布袋甚奇特背負肩駝不肯拋擲只知入水去求人爭奈腳跟浮逼逼過水寒山二一句子少機杼作是思惟時吾心在何許芭蕉葉上三更雨一見重岩壁立挺然氣宇爭高默默思量覔句可憐走却金毛拾得生苕提在手放下絶諸塵轉掃復轉有松門十里春如晝麼墨趲人下筆肚裡難禁技癢頻頻轉腦回頭不知失了白象朝陽穿破衲寸鐵在手橫穿竪穿劄不入處日輪升天對月了殘經黑豆未芽朝數暮數開得眼來月圓當戶讚真覺像化姜布喫德山惡辣耐同參逼拶蕩除露布葛藤直得水底火發阿刺剌夫是之謂真覺菩薩真覺德山全其顛岩頭插其尾逼成一箇老於菟兩眼耽耽沒牙齒咦文殊七佛命之為師法王稱之為子五時開演始終輔贊世尊三昧常行談笑發揮龍女曾現百千妙相迦葉椎不能舉自言我真文殊其餘是甚伴侶維摩諳菩薩之法式現居士之儀形聞如來名跳下妙喜世界憫衆生苦示疾毗耶離城萬化出於神變一猶如建瓴洎扣不二之法何得默而無聲馬郎婦携魚籃呈粉面勾動馬家郎眼花山影轉七軸蓮經念到頭乞與黃金骨一串靈照女拋世業蹈玄機阿爺無藉賴女子更頑皮情知未若貧而樂特故沿階賣笊篱玄沙換却頭顱脫謝家南臺江上足生涯爛膿滴滴無人會笑倒白蘋紅蓼花船子藥山之子石頭孫飢過心荒浪裡奔得箇錦鱗如許大看來當與道吾分圓照和尚頂相奚翁請一筆傳來是何形狀倣佛宸封老樹王亭亭撑出凌霄上無些子枝葉有十分氣量端的藂林之榜樣石溪和尚頂相柏堂請咄者老和尚可煞慈悲相清影落人間香名透天上彈瑕纇於八方迪精明於萬象石骨崚嶒溪光蕩漾一筆傳來衆工絶唱凌霄峰頂堆青嶂佛光法師真相致藏主請僧中英教中傑掛宋朝金襴肆台衡木舌如天河翻如巖石裂萎花風掃雨新奇電影已收雷未絶若是五逆兒郎見徹明徹描邈得徹信知這老和尚已說今說當如是說白雲推出團團月自讚我本無此相硬畫箇模樣譬夫天台華頂峰陰晴顯晦幾般狀顧陸妙丹青也只寫不像寫得像望他頂𩕳頭何啻四萬八千丈謂是絶岸眼裡著楔謂非絶岸水中撈月描不成見不徹分明頭戴雪山雪衝開碧落攧碎斷崖箇般摽致其誰與偕咦九巖常住請單絲作線獨掌打拍改樣畫猫兒令一般體格攪得蒙泉徹底渾領邊那免千斤軛淨社莊長老請似真非真似假非假遠遠描邈將來雙眉移在眼下誰其為之西山淨社切忌認驢而作馬杭州普圓庵請花插不萌枝衣披無縫襖百萬人前輥繡毬八十翁翁忘却老挨開千聖門乾坤只把一毛吞拶透長安道淨穢不禁苕掃當年曾蹈須彌盧而今覺見衆山小布丹青打之繞猫兒洗面自道好高峯妙長老頂相沈一居士請去却一拈得七拶破疑團咄咄咄跳上天目山據却獅子窟返擲有餘態江湖聲響出且喜吾家有此郎賽過天下大禪佛頌石壁喝不開兮鑿不開春風幾度長莓苔趙州主丈雖麁糲未必親曾靠著來海南大地山河滾浪花丙丁童子眼瞇回頭打得重溟透赤腳波斯進象牙一山萬機俱罷口門緘喚作如如落二三拶得通身歸峭壁善財不到別峰參問庵撞入柴門扣有麼趙州用打不防家依前只把拳頭竪未必蒿湯當得茶雪巖片片不於他處落當陽突出嶮崖機此時築著聱禪客卒急龐公未得歸空谷者畔才呼那畔譍萬千樵子逐虗聲探尋直是無蹤跡只見青山青又青獨山兩洗風磨孤逈逈樹凋葉落峭巍巍惟茲一事無兼帶澤廣如何掩得伊枕肱軒全身放倒恣憨癡肘臂分明曲向誰更要夢中重說夢我無木枕可來推漁浦接待吳山那畔越山前有充飢有榻眠到此縱能休歇去帝鄉猶隔一潮船謝送圓照和尚法衣迦葉師兄守底衣四邊將見逐雲飛雪峰知是吾家物合掌低頭捧取歸送珙首座歸溫州江月松風何處無戒珠心印強名模煩君歸問老真覺因甚闍梨氣不除示禪客啓咨和尚意如何一句相酬早事多問未絶聲猶一問不知子過新羅淨庵居士求不書心字涴窗門玉混泥沙體自分萬慮頓忘諸穢息碧天無滓水無痕送證侍者歸里臨老三回住雪山無絃琴子逐時彈夜來一曲最高韻瀉作西江十八灘送小師心印遊方自從落腳出娘胎一印何曾打失來滿目春山春水緑重重綿縫為誰開忙古參政造金塔盛舍利撒下摩尼六七顆湧高窣堵十三層分明一點鈞心現豈是黃金煉得成寄神光末宗和尚萬丈神光滌世昏莫知誰信有乾坤三山眼底多尊宿那箇來敲老觀門大維那求自仰山來仰山推枕玩嬌兒等是機前展大悲何必換頭呈素面重堆脂粉畫娥眉寄秀峰烏石長老三年魚鴈杳相聞閩浙雖分意不分幾度臨風揩老眼冷看烏石嶺頭雲小佛事誰翁嗣西堂塔咄哉同契嗣誰翁檀板曾敲秀水東昨夜忽然翻別調髑髏竅裡吼松風餘音裊裊有跡無蹤青山藏不得明月恰相容為國清清虗和尚起龕下泥犁種發牀弩機釘一箭於太湖魚龍乞命展㕛趺於更好寒拾攢眉倒騎白額佛眼難窺昨夜三更過鐵圍璨維那火興化打克賓篩鹽費醋雲峰聞桶𪹼接響承虗擊碎重關死中得活既得活正好投身參勝熱平侍者塔臨濟掌黃檗以不平報不平鳥窠吹布毛無計較立計較髑髏著地智者須知木人把板雲中拍石女含笙水底吹慧上座火日不離衆夜不離衆以慧為體以定為用雖則是箇死蛇一生偏解活弄定慧圓明不滯空焦磚打著連底凍珂直歲火天晴刈却禾雨落蓋却屋祖意甚分明動絃誰別曲朝悠悠暮碌碌死灰無𦦨空馳逐良珂良珂照顧火燭石山藏主火孤硬如石端重如山毗盧藏海一踏踏翻到者裡何名生死何名涅槃要識真金火裡看湛上座起骨灰寒火冷水湛波停者裡泊住賺殺師僧何故猶較曹溪半月程通藏主塔通身是遍身是照古照今徹骨徹髓自餘一大藏教當甚拭瘡疣紙從教揚在深雲裡戒知客火見徹賓中主唱起還鄉曲清淨行者不入涅槃破戒比丘不入地獄二塗抹過甚處為家披毛遊火聚帶角輥塵沙新戒落髮輪王三寸鐵用不犯鋒鋩毫髮無留礙重輝頂上光付衣梅嶺一傳只者一著輕似鴻毛重如山嶽披襟當去話方行麒麟掣斷黃金索演福掛寺額教是佛語禪是佛心古佛示此額顯心之苗今佛成此額明語之本根苗一體心語同源直得雲漢昭回大地宏開壽域鸞鳳飛舞少林鼓躍春風凡見聞悉皆歡榮而證入不可思議重重華藏海處處總持門原其旨歸由元勳之願力獲茲殊勝感二佛之發因只如特卜良辰高標此額一句如何提唱崇恩恩勿極演福無窮跋密庵授笑庵法語齊侍者求世尊有密語迦葉不覆藏的的相承甚於蠱毒到其家者水可飲乎然密庵而有笑庵猶世尊而有迦葉笑顏一破密語乖張直下子孫無計遮掩思齊侍者對豫告訐故據欵而結云血書華嚴釋迦老子七處九會含血噴人究竟將來猶是傳言送語本彰維那向十指爪邊深錐痛劄一筆書就且非和墨徇朱雖然畢竟傳誰之言送誰之語華嚴四種法界莫擬是那法界中收彰由此起疑特求點出豫曰豈不見善財童子遍參五十三知識人推一人末後得彌勒指見文殊文殊指見佛佛所指者是那些箇明眼阿師切忌蹉過錢東巖侍郎書金剛經淵首座求此經堅如金剛豈容錐劄因空生道箇希有起人二十七疑瞿曇憫物垂慈節節破蕩東巖侍郎不忘其旨從而筆之字義炳然急須著眼諸山金塔頌軸後昔阿育王造八萬四千塔奉釋尊舍利無量為一今大丞相製十三層窣堵藏諸祖師寶珠一為無量若以今之視昔亦猶昔之視今皆從正念流來豈間然也須知描不成時金光燁燁畫不得處玉影團團致君為堯舜之君澤民為堯舜之民無出此爾靜庵頌軸後寂靜奢摩他非庵內不知庵外事者莫能證入入則入已忽有人云還許專甲進步也無只向道去汝正閙在書癡絶和尚出山相并達磨見梁王兩頌後雪山凍餓不死流毒世間被害者甚多恨不早遇於韶石是可毀也是不可毀也逾海越漢而來平欺東土慈悲或鼓倒首因蹉過於梁王是可贊耶是不可贊耶為上禪人題送行軸之仰山鐘阜當今法道雕零師門淡薄咸推集雲鐘阜為大江獨步上禪者一意瞻禮仍問津於老者故語之曰一人向鷹窠中撒爪一人於劒刃上橫身近著則喪膽亡魂擬之則頭破額裂汝欲親近須解抉其劒翻其窠不妨有入作分不然切忌髑髏遍地
